name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create signing.properties
        run: |
          echo "storeFilePath=release.jks" > signing.properties
          echo "storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> signing.properties
          echo "keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}" >> signing.properties
          echo "keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}" >> signing.properties

      - name: Decode keystore
        run: |
          echo ${{ secrets.RELEASE_KEYSTORE_BASE64 }} | base64 -d > release.jks

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FuckAutoDaily-${{ github.run_id }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
